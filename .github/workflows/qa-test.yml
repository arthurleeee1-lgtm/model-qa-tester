name: QA Model Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Model to test"
        required: false
        default: "deepseek/deepseek-chat-v3.1"

env:
  CANOPYWAVE_API_KEY: ${{ secrets.CANOPYWAVE_API_KEY }}
  CANOPYWAVE_BASE_URL: https://inference.canopywave.io/v1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run QA tests
        run: |
          python -m src.runner \
            --config tests/qa_tests.yaml \
            --output reports \
            --format all \
            ${{ github.event.inputs.model && format('--model {0}', github.event.inputs.model) || '' }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-html
          path: reports/index.html
          retention-days: 30

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-json
          path: reports/report.json
          retention-days: 30

      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-junit
          path: reports/junit.xml
          retention-days: 30

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/junit.xml
          check_name: "QA Test Results"
          comment_mode: "update last"

  notify:
    runs-on: ubuntu-latest
    needs: test
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: qa-report-json
          path: reports

      - name: Notify on failure
        run: |
          echo "Tests failed! Check the report for details."
          # Add Slack/Email notification here if needed
          # Example with Slack:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"QA Tests failed! Check GitHub Actions for details."}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
